name: Build & Push Image

on:
  push:
    tags: ['*']
  workflow_dispatch:

env:
  REGISTRY: nxsonpvmsgit001.nexsport.priv:3000
  IMAGE: nxsonpvmsgit001.nexsport.priv:3000/infrastructure/docker-flutter-ci
  FASTLANE_VERSION: "2.232.1"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_PLATFORMS: "34 36"
  ANDROID_NDK: "28.2.13676358"
  CMAKE_VERSION: "3.22.1"

jobs:
  build-and-push:
    runs-on: ubuntu
    steps:
      - uses: actions/checkout@v4
        with:
          github-server-url: http://nxsonpvmsgit001.nexsport.priv:3000

      - name: Determine version
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "TAG=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Forgejo Registry
        run: >
          echo "${{ secrets.REGISTRY_TOKEN }}" |
          docker login ${{ env.REGISTRY }}
          -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build image
        run: >
          docker build
          --target android
          --build-arg flutter_version=${{ steps.version.outputs.TAG }}
          --build-arg fastlane_version=${{ env.FASTLANE_VERSION }}
          --build-arg android_build_tools_version=${{ env.ANDROID_BUILD_TOOLS }}
          --build-arg android_platform_versions="${{ env.ANDROID_PLATFORMS }}"
          --build-arg android_ndk_version=${{ env.ANDROID_NDK }}
          --build-arg cmake_version=${{ env.CMAKE_VERSION }}
          -t ${{ env.IMAGE }}:${{ steps.version.outputs.TAG }}
          .

      - name: Tag latest
        if: github.ref_type == 'tag'
        run: docker tag ${{ env.IMAGE }}:${{ steps.version.outputs.TAG }} ${{ env.IMAGE }}:latest

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.version.outputs.TAG }}
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            docker push ${{ env.IMAGE }}:latest
          fi

      - name: Extract tool versions
        id: tools
        run: |
          IMG="${{ env.IMAGE }}:${{ steps.version.outputs.TAG }}"
          VERSIONS=$(docker run --rm "$IMG" bash -c '
            echo "| Outil | Version |"
            echo "|-------|---------|"
            echo "| Flutter | $(flutter --version | head -1) |"
            echo "| Dart | $(dart --version 2>&1 | head -1) |"
            echo "| Java | $(java --version 2>&1 | head -1) |"
            echo "| Node.js | $(node --version) |"
            echo "| Ruby | $(ruby --version | cut -d" " -f1-2) |"
            GRADLE_V=$(ls /root/.gradle/wrapper/dists/ 2>/dev/null | grep -oP "gradle-\K[0-9.]+" | head -1 || echo "pre-cached")
            echo "| Gradle | $GRADLE_V |"
          ')
          echo "VERSIONS<<TOOLSEOF" >> "$GITHUB_OUTPUT"
          echo "$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "TOOLSEOF" >> "$GITHUB_OUTPUT"

      - name: Create Forgejo release
        if: github.ref_type == 'tag'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.TAG }}
          RELEASE_IMAGE: ${{ env.IMAGE }}:${{ steps.version.outputs.TAG }}
          RELEASE_VERSIONS: ${{ steps.tools.outputs.VERSIONS }}
          RELEASE_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          RELEASE_API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases
        run: |
          read -r -d '' BODY <<EOF || true
          **Image Docker :** \`${RELEASE_IMAGE}\`

          \`\`\`
          docker pull ${RELEASE_IMAGE}
          \`\`\`

          ### Outils installés

          ${RELEASE_VERSIONS}

          ### Base

          Debian 13 Trixie slim
          EOF
          BODY=$(echo "$BODY" | sed 's/^          //')
          ESCAPED_BODY=$(printf '%s' "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          curl -sf -X POST "${RELEASE_API}" \
            -H "Authorization: token ${RELEASE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${RELEASE_TAG}\",\"name\":\"${RELEASE_TAG}\",\"body\":${ESCAPED_BODY},\"draft\":false,\"prerelease\":false}"